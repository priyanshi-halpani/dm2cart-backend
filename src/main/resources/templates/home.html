<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Welcome | DM2cart</title>
    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #fce4ec, #e3f2fd);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.1);
            width: 420px;
            animation: popIn 1.2s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 34px;
            color: #6d4c41;
            margin-bottom: 10px;
        }

        p {
            font-size: 17px;
            color: #555;
        }

        .tagline {
            font-weight: 600;
            color: #8e24aa;
            margin-top: 10px;
        }

        .features {
            margin-top: 25px;
            text-align: left;
            padding-left: 40px;
            color: #444;
        }

        .features li {
            margin: 8px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            background: #ce93d8;
            color: white;
            padding: 12px 22px;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ab47bc;
            box-shadow: 0px 4px 10px rgba(171, 71, 188, 0.4);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Welcome to DM2cart</h1>
    <p class="tagline">Delivering More • Doing More • Digital Market 2Cart</p>

    <p>Your one-stop solution for easy shopping, fast orders,
        and a smooth digital experience.</p>

    <ul class="features">
        <li>✔ Fast & Secure Checkout</li>
        <li>✔ Latest Products & Offers</li>
        <li>✔ User-Friendly Experience</li>
        <li>✔ 24/7 Smart Support</li>
    </ul>

</div>

</body>
</html>
